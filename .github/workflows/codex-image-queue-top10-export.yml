name: Codex Image Queue Top 10 Export

on:
  push:
    branches:
      - codex/etsy-oauth-fix-20260707
    paths:
      - ".github/workflows/codex-image-queue-top10-export.yml"

permissions:
  contents: write

concurrency:
  group: image-queue-top10-export
  cancel-in-progress: false

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
      PROD_SSH_USER: ${{ secrets.PROD_SSH_USER }}
      PROD_SSH_PORT: ${{ secrets.PROD_SSH_PORT }}
      PROD_SSH_PRIVATE_KEY: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        shell: bash
        run: |
          : "${PROD_SSH_HOST:?Missing PROD_SSH_HOST}"
          : "${PROD_SSH_USER:?Missing PROD_SSH_USER}"
          : "${PROD_SSH_PORT:?Missing PROD_SSH_PORT}"
          : "${PROD_SSH_PRIVATE_KEY:?Missing PROD_SSH_PRIVATE_KEY}"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          python3 - <<'PY'
          import base64, os, sys
          from pathlib import Path
          raw = os.environ["PROD_SSH_PRIVATE_KEY"].strip()
          key = raw.replace("\\r", "").replace("\r", "").replace("\\n", "\n")
          if "BEGIN " not in key:
              try:
                  decoded = base64.b64decode(raw).decode("utf-8")
                  decoded = decoded.replace("\\r", "").replace("\r", "").replace("\\n", "\n")
                  if "BEGIN " in decoded:
                      key = decoded
              except Exception:
                  pass
          if "BEGIN " not in key:
              print("Invalid private key", file=sys.stderr)
              sys.exit(1)
          if not key.endswith("\n"):
              key += "\n"
          Path.home().joinpath(".ssh", "prod").write_text(key)
          PY
          chmod 600 ~/.ssh/prod
          ssh-keyscan -p "$PROD_SSH_PORT" -H "$PROD_SSH_HOST" >> ~/.ssh/known_hosts

      - name: Export image queue source data
        shell: bash
        run: |
          mkdir -p codex_outputs
          ssh -i ~/.ssh/prod -o BatchMode=yes -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -p "$PROD_SSH_PORT" "$PROD_SSH_USER@$PROD_SSH_HOST" 'bash -s' > codex_outputs/image-queue-top10-source.json <<'REMOTE'
          set -euo pipefail
          APP_DIR="/root/mykinlegacy/mensskull-etsy-ai-manager"
          FOUND_DIR="$(pm2 jlist | node -e '
            let data="";
            process.stdin.on("data", c => data += c);
            process.stdin.on("end", () => {
              const arr = JSON.parse(data || "[]");
              const match = arr.find(p => p.name === "mensskull-etsy-ai-manager" || JSON.stringify(p).includes("etsy-ai-manager") || p.pm2_env?.PORT == "3000");
              if (match?.pm2_env?.pm_cwd) console.log(match.pm2_env.pm_cwd);
            });
          ' || true)"
          if [ -n "${FOUND_DIR:-}" ] && [ -d "$FOUND_DIR" ]; then APP_DIR="$FOUND_DIR"; fi
          cd "$APP_DIR"
          node <<'NODE'
          const fs = require("fs");
          for (const file of [".env", ".env.local"]) {
            if (!fs.existsSync(file)) continue;
            for (const line of fs.readFileSync(file, "utf8").split(/\r?\n/)) {
              const match = line.match(/^\s*([A-Za-z_][A-Za-z0-9_]*)\s*=\s*(.*)\s*$/);
              if (!match) continue;
              process.env[match[1]] = match[2].trim().replace(/^['"]|['"]$/g, "");
            }
          }
          const { PrismaClient } = require("@prisma/client");
          const prisma = new PrismaClient();
          const targets = [
            { productName: "Custom Solid Brass Car Emblem", match: ["custom solid brass car emblem"] },
            { productName: "Hellboy Skull Ring", match: ["hellboy skull ring"] },
            { productName: "Bearded Skull Ring", match: ["bearded skull ring"] },
            { productName: "Spiked Fishbone Wallet Chain", match: ["spiked fishbone wallet chain"] },
            { productName: "Sterling Silver Skull Ring for Men", match: ["sterling silver skull ring for men", "gothic biker custom size ring"] },
            { productName: "Heavy Skull Ring for Men", match: ["heavy skull ring for men", "solid 925 silver gothic biker ring"] },
            { productName: "Gothic Key Necklace", match: ["gothic key necklace"] },
            { productName: "Amenadiel Angel Pendant", match: ["amenadiel angel pendant"] },
            { productName: "Gothic Cross Pants Chain", match: ["gothic cross pants chain"] },
            { productName: "Black Mamba Snake Ring", match: ["black mamba snake ring"] }
          ];
          const parse = (value, fallback = {}) => {
            try { return value ? JSON.parse(value) : fallback; } catch { return fallback; }
          };
          (async () => {
            const listings = await prisma.listing.findMany({
              include: {
                images: { orderBy: { position: "asc" } },
                inventory: true,
                aiReports: { where: { analysisVersion: "listing-intelligence-v2" }, orderBy: { updatedAt: "desc" }, take: 1 }
              }
            });
            const output = targets.map((target, index) => {
              const listing = listings.find((candidate) => {
                const title = candidate.title.toLowerCase();
                return target.match.some((term) => title.includes(term));
              });
              if (!listing) return { rank: index + 1, productName: target.productName, missing: true };
              const report = listing.aiReports[0];
              const actions = parse(report?.recommendedActions);
              return {
                rank: index + 1,
                productName: target.productName,
                listingId: listing.id,
                etsyListingId: listing.etsyListingId,
                currentTitle: listing.title,
                url: listing.url,
                price: listing.price,
                quantity: listing.inventory?.quantity ?? listing.quantity,
                imageCount: listing.images.length,
                images: listing.images.map((image) => ({
                  position: image.position,
                  role: image.role,
                  alt: image.alt,
                  url: image.url,
                  etsyImageId: image.etsyImageId
                })),
                scores: report ? {
                  seo: report.seoScore,
                  title: report.titleScore,
                  tags: report.tagScore,
                  images: report.imageScore,
                  conversion: report.conversionScore,
                  pricing: report.pricingScore,
                  opportunity: report.opportunityScore,
                  risk: report.riskLevel,
                  priority: report.overallPriority
                } : null,
                imageSuggestions: actions.images?.suggestions || [],
                priorityReasons: actions.priorityReasons || []
              };
            });
            console.log(JSON.stringify({ exportedAt: new Date().toISOString(), source: "production local database, read-only", products: output }, null, 2));
          })().finally(() => prisma.$disconnect());
          NODE
          REMOTE
          git config user.name "codex-analysis-bot"
          git config user.email "codex-analysis-bot@users.noreply.github.com"
          git add codex_outputs/image-queue-top10-source.json
          git commit -m "Add image queue top 10 source export" || exit 0
          git push
