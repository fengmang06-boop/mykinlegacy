name: Codex Etsy P3 Verify

on:
  push:
    branches:
      - codex/etsy-oauth-fix-20260707
    paths:
      - ".github/workflows/codex-etsy-p3-verify.yml"

permissions:
  contents: read

concurrency:
  group: etsy-p3-verify
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
      PROD_SSH_USER: ${{ secrets.PROD_SSH_USER }}
      PROD_SSH_PORT: ${{ secrets.PROD_SSH_PORT }}
      PROD_SSH_PRIVATE_KEY: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        shell: bash
        run: |
          : "${PROD_SSH_HOST:?Missing PROD_SSH_HOST}"
          : "${PROD_SSH_USER:?Missing PROD_SSH_USER}"
          : "${PROD_SSH_PORT:?Missing PROD_SSH_PORT}"
          : "${PROD_SSH_PRIVATE_KEY:?Missing PROD_SSH_PRIVATE_KEY}"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          python3 - <<'PY'
          import base64, os, sys
          from pathlib import Path
          raw = os.environ["PROD_SSH_PRIVATE_KEY"].strip()
          key = raw.replace("\\r", "").replace("\r", "").replace("\\n", "\n")
          if "BEGIN " not in key:
              try:
                  decoded = base64.b64decode(raw).decode("utf-8")
                  decoded = decoded.replace("\\r", "").replace("\r", "").replace("\\n", "\n")
                  if "BEGIN " in decoded:
                      key = decoded
              except Exception:
                  pass
          if "BEGIN " not in key:
              print("Invalid private key", file=sys.stderr)
              sys.exit(1)
          if not key.endswith("\n"):
              key += "\n"
          Path.home().joinpath(".ssh", "prod").write_text(key)
          PY
          chmod 600 ~/.ssh/prod
          ssh-keyscan -p "$PROD_SSH_PORT" -H "$PROD_SSH_HOST" >> ~/.ssh/known_hosts

      - name: Verify Etsy P3 production
        shell: bash
        run: |
          ssh -i ~/.ssh/prod -o BatchMode=yes -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -p "$PROD_SSH_PORT" "$PROD_SSH_USER@$PROD_SSH_HOST" 'bash -s' <<'REMOTE'
          set -euo pipefail
          APP_DIR="/root/mykinlegacy/mensskull-etsy-ai-manager"
          FOUND_DIR="$(pm2 jlist | node -e '
            let data="";
            process.stdin.on("data", c => data += c);
            process.stdin.on("end", () => {
              const arr = JSON.parse(data || "[]");
              const match = arr.find(p => p.name === "mensskull-etsy-ai-manager" || JSON.stringify(p).includes("etsy-ai-manager") || p.pm2_env?.PORT == "3000");
              if (match?.pm2_env?.pm_cwd) console.log(match.pm2_env.pm_cwd);
            });
          ' || true)"
          if [ -n "${FOUND_DIR:-}" ] && [ -d "$FOUND_DIR" ]; then APP_DIR="$FOUND_DIR"; fi
          cd "$APP_DIR"
          node <<'NODE'
          const fs = require("fs");
          for (const file of [".env", ".env.local"]) {
            if (!fs.existsSync(file)) continue;
            for (const line of fs.readFileSync(file, "utf8").split(/\r?\n/)) {
              const match = line.match(/^\s*([A-Za-z_][A-Za-z0-9_]*)\s*=\s*(.*)\s*$/);
              if (!match) continue;
              process.env[match[1]] = match[2].trim().replace(/^['"]|['"]$/g, "");
            }
          }
          const { PrismaClient } = require("@prisma/client");
          const prisma = new PrismaClient();
          const avg = (items, key) => Math.round(items.reduce((sum, item) => sum + item[key], 0) / Math.max(items.length, 1));
          (async () => {
            const reports = await prisma.listingAiReport.findMany({
              where: { analysisVersion: "listing-intelligence-v2" },
              include: { listing: true },
              orderBy: { updatedAt: "desc" }
            });
            const latestByListing = new Map();
            for (const report of reports) {
              if (!latestByListing.has(report.listingId)) latestByListing.set(report.listingId, report);
            }
            const latest = Array.from(latestByListing.values());
            const [listings, snapshots, queueItems] = await Promise.all([
              prisma.listing.count(),
              prisma.listingAiSnapshot.count({ where: { analysisVersion: "listing-intelligence-v2" } }),
              prisma.optimizationQueueItem.count({ where: { status: "pending" } })
            ]);
            const top10 = [...latest]
              .sort((a, b) => b.opportunityScore - a.opportunityScore || a.conversionScore - b.conversionScore)
              .slice(0, 10)
              .map((report) => ({
                title: report.listing.title,
                priority: report.overallPriority,
                risk: report.riskLevel,
                seo: report.seoScore,
                conversion: report.conversionScore,
                opportunity: report.opportunityScore
              }));
            console.log("P3_VERIFY_JSON=" + JSON.stringify({
              listings,
              analyzed: latest.length,
              avgSeo: avg(latest, "seoScore"),
              avgConversion: avg(latest, "conversionScore"),
              avgOpportunity: avg(latest, "opportunityScore"),
              snapshots,
              queueItems,
              top10
            }));
            if (listings < 200 || latest.length < listings || snapshots < listings || queueItems < 1) process.exitCode = 1;
          })().finally(() => prisma.$disconnect());
          NODE
          curl -k -sS -o /dev/null -w "tools_etsy_ai=%{http_code}\n" --max-time 30 https://tools.mensskull.com/etsy-ai
          curl -k -sS -o /dev/null -w "mykinlegacy_home=%{http_code}\n" --max-time 30 https://mykinlegacy.com/
          REMOTE
