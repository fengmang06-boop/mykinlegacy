name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: production-mykinlegacy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy main to production
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
      PROD_SSH_USER: ${{ secrets.PROD_SSH_USER }}
      PROD_SSH_PORT: ${{ secrets.PROD_SSH_PORT }}
      PROD_SSH_PRIVATE_KEY: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
      PROD_PROJECT_DIR: ${{ secrets.PROD_PROJECT_DIR }}
      REGISTRY: ghcr.io
      IMAGE_REPOSITORY: mykinlegacy-app
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate production secrets
        shell: bash
        run: |
          : "${PROD_SSH_HOST:?Missing PROD_SSH_HOST}"
          : "${PROD_SSH_USER:?Missing PROD_SSH_USER}"
          : "${PROD_SSH_PORT:?Missing PROD_SSH_PORT}"
          : "${PROD_SSH_PRIVATE_KEY:?Missing PROD_SSH_PRIVATE_KEY}"
          : "${PROD_PROJECT_DIR:?Missing PROD_PROJECT_DIR}"

      - name: Prepare image metadata
        id: image_meta
        shell: bash
        run: |
          OWNER_LOWER="${GITHUB_REPOSITORY_OWNER,,}"
          IMAGE_NAME="${REGISTRY}/${OWNER_LOWER}/${IMAGE_REPOSITORY}"
          echo "IMAGE_NAME=${IMAGE_NAME}" >> "$GITHUB_ENV"
          echo "APP_IMAGE=${IMAGE_NAME}:${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "APP_IMAGE_LATEST=${IMAGE_NAME}:main" >> "$GITHUB_ENV"
          echo "image_name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "app_image=${IMAGE_NAME}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "app_image_latest=${IMAGE_NAME}:main" >> "$GITHUB_OUTPUT"
          echo "Image: ${IMAGE_NAME}:${GITHUB_SHA}"

      - name: Configure SSH for capacity preflight
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          python3 - <<'PY'
          import base64
          import os
          import sys
          from pathlib import Path

          raw = os.environ["PROD_SSH_PRIVATE_KEY"].strip()
          key = raw.replace("\\r", "").replace("\r", "").replace("\\n", "\n")
          if "BEGIN " not in key:
              try:
                  key = base64.b64decode(raw).decode("utf-8").replace("\r", "").replace("\\n", "\n")
              except Exception:
                  pass
          if "BEGIN " not in key:
              print("Invalid production SSH key.", file=sys.stderr)
              sys.exit(1)
          if not key.endswith("\n"):
              key += "\n"
          Path.home().joinpath(".ssh", "mykinlegacy_prod").write_text(key)
          PY
          chmod 600 ~/.ssh/mykinlegacy_prod
          ssh-keygen -y -f ~/.ssh/mykinlegacy_prod >/dev/null
          ssh-keyscan -p "$PROD_SSH_PORT" -H "$PROD_SSH_HOST" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Production capacity gate before build
        shell: bash
        run: |
          ssh -i ~/.ssh/mykinlegacy_prod \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -p "$PROD_SSH_PORT" \
            "$PROD_SSH_USER@$PROD_SSH_HOST" \
            'bash -s' -- "$PROD_PROJECT_DIR" <<'REMOTE_SCRIPT'
          set -euo pipefail
          PROJECT_DIR="$1"
          cd "$PROJECT_DIR"
          bash deployment/with-production-lock.sh "deploy-capacity-preflight" bash -lc '
            set -euo pipefail
            read -r total used free usage < <(df -P -B1 / | awk "NR == 2 {gsub(/%/, \"\", \$5); print \$2, \$3, \$4, \$5}")
            read -r itotal iused ifree iusage < <(df -P -i / | awk "NR == 2 {gsub(/%/, \"\", \$5); print \$2, \$3, \$4, \$5}")
            mysql_health="$(docker inspect --format "{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}" mykinlegacy_mysql 2>/dev/null || echo unavailable)"
            docker info >/dev/null 2>&1 && docker_health=healthy || docker_health=unhealthy
            echo "CAPACITY_PREFLIGHT usage_percent=$usage free_bytes=$free inode_percent=$iusage mysql=$mysql_health docker=$docker_health"
            if [ "$usage" -ge 85 ] || [ "$free" -lt 16106127360 ] || [ "$iusage" -ge 85 ] ||
              [ "$mysql_health" != healthy ] || [ "$docker_health" != healthy ]; then
              echo "DEPLOYMENT_BLOCKED_LOW_DISK_CAPACITY" >&2
              exit 78
            fi
            echo "CAPACITY_PREFLIGHT_PASS"
          '
          REMOTE_SCRIPT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push production image
        uses: docker/build-push-action@v6
        timeout-minutes: 30
        with:
          context: .
          file: deployment/Dockerfile
          push: true
          tags: |
            ${{ steps.image_meta.outputs.app_image }}
            ${{ steps.image_meta.outputs.app_image_latest }}
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=/api/v1
            NEXT_PUBLIC_SITE_URL=https://mykinlegacy.com
            NEXT_PUBLIC_GA_MEASUREMENT_ID=G-SD7D57WEH0
            APP_WEB_URL=https://mykinlegacy.com
            APP_BASE_URL=https://mykinlegacy.com
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Configure SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          python3 - <<'PY'
          import base64
          import os
          import sys
          from pathlib import Path

          raw_key = os.environ["PROD_SSH_PRIVATE_KEY"].strip()
          key = raw_key.replace("\\r", "").replace("\r", "")
          key = key.replace("\\n", "\n")

          if "BEGIN " not in key:
              try:
                  decoded = base64.b64decode(raw_key).decode("utf-8")
                  decoded = decoded.replace("\\r", "").replace("\r", "")
                  decoded = decoded.replace("\\n", "\n")
                  if "BEGIN " in decoded:
                      key = decoded
              except Exception:
                  pass

          valid_headers = (
              "-----BEGIN OPENSSH PRIVATE KEY-----",
              "-----BEGIN RSA PRIVATE KEY-----",
              "-----BEGIN EC PRIVATE KEY-----",
          )
          if not any(header in key for header in valid_headers):
              print("PROD_SSH_PRIVATE_KEY is not a valid OpenSSH/RSA/EC private key. Replace the GitHub Secret with the full private key, not the public key.", file=sys.stderr)
              sys.exit(1)

          if not key.endswith("\n"):
              key += "\n"

          Path.home().joinpath(".ssh", "mykinlegacy_prod").write_text(key)
          PY
          chmod 600 ~/.ssh/mykinlegacy_prod
          ssh-keygen -y -f ~/.ssh/mykinlegacy_prod > /dev/null
          ssh-keyscan -p "$PROD_SSH_PORT" -H "$PROD_SSH_HOST" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy on production VPS
        shell: bash
        timeout-minutes: 25
        env:
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
          APP_IMAGE: ${{ steps.image_meta.outputs.app_image }}
        run: |
          ssh -i ~/.ssh/mykinlegacy_prod \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=20 \
            -p "$PROD_SSH_PORT" \
            "$PROD_SSH_USER@$PROD_SSH_HOST" \
            'bash -s' -- "$PROD_PROJECT_DIR" "$APP_IMAGE" "$GHCR_USERNAME" "$GHCR_TOKEN" <<'REMOTE_SCRIPT'
          set -euo pipefail
          PROJECT_DIR="$1"
          APP_IMAGE="$2"
          GHCR_USERNAME="$3"
          GHCR_TOKEN="$4"

          cleanup() {
            docker logout ghcr.io >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          cd "$PROJECT_DIR"
          git fetch origin main
          git checkout main
          git pull --ff-only origin main

          printf '%s' "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin >/dev/null
          APP_IMAGE="$APP_IMAGE" bash deployment/deploy.sh
          bash deployment/status.sh
          REMOTE_SCRIPT
