name: MyKinLegacy Production Ops

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Operation to run"
        required: true
        type: choice
        options:
          - health_check
          - inspect_production_lock
          - terminate_stuck_production_deployment
          - restart_nginx
          - restart_services
          - docker_ps
          - nginx_logs
          - api_logs
          - web_logs
          - worker_logs
          - pause_checkout
          - resume_checkout
          - switch_stripe_live
          - verify_stripe_checkout_branding
          - inspect_order
          - repair_order_artifacts
          - verify_download_binaries
          - founder_final_order_verification
          - approve_founder_delivery
          - ai_image_bridge_order_test
          - safe_deploy
      order_number:
        description: "Order number for order-specific actions"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: production-mykinlegacy
  cancel-in-progress: false

jobs:
  ops:
    name: Run production ops action
    runs-on: ubuntu-latest
    env:
      PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
      PROD_SSH_USER: ${{ secrets.PROD_SSH_USER }}
      PROD_SSH_PORT: ${{ secrets.PROD_SSH_PORT }}
      PROD_SSH_PRIVATE_KEY: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
      PROD_PROJECT_DIR: ${{ secrets.PROD_PROJECT_DIR }}
      OPS_ACTION: ${{ inputs.action }}
      ORDER_NUMBER: ${{ inputs.order_number }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      STRIPE_LIVE_SECRET_KEY: ${{ secrets.MYKINLEGACY_STRIPE_LIVE_SECRET_KEY }}
      STRIPE_LIVE_WEBHOOK_SECRET: ${{ secrets.MYKINLEGACY_STRIPE_LIVE_WEBHOOK_SECRET }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate inputs and production secrets
        shell: bash
        run: |
          : "${PROD_SSH_HOST:?Missing PROD_SSH_HOST}"
          : "${PROD_SSH_USER:?Missing PROD_SSH_USER}"
          : "${PROD_SSH_PORT:?Missing PROD_SSH_PORT}"
          : "${PROD_SSH_PRIVATE_KEY:?Missing PROD_SSH_PRIVATE_KEY}"
          : "${PROD_PROJECT_DIR:?Missing PROD_PROJECT_DIR}"
          : "${OPS_ACTION:?Missing action}"

          case "$OPS_ACTION" in
            health_check|inspect_production_lock|terminate_stuck_production_deployment|safe_deploy|restart_nginx|restart_services|docker_ps|nginx_logs|api_logs|web_logs|worker_logs|pause_checkout|resume_checkout|verify_stripe_checkout_branding)
              ;;
            switch_stripe_live)
              : "${STRIPE_LIVE_SECRET_KEY:?Missing MYKINLEGACY_STRIPE_LIVE_SECRET_KEY}"
              : "${STRIPE_LIVE_WEBHOOK_SECRET:?Missing MYKINLEGACY_STRIPE_LIVE_WEBHOOK_SECRET}"
              ;;
            inspect_order|repair_order_artifacts|verify_download_binaries|founder_final_order_verification|approve_founder_delivery|ai_image_bridge_order_test)
              if [[ ! "$ORDER_NUMBER" =~ ^[A-Z0-9-]{8,64}$ ]]; then
                echo "A valid order_number is required for action ${OPS_ACTION}." >&2
                exit 1
              fi
              ;;
            *)
              echo "Unsupported action: ${OPS_ACTION}" >&2
              exit 1
              ;;
          esac

      - name: Configure SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          python3 - <<'PY'
          import base64
          import os
          import sys
          from pathlib import Path

          raw_key = os.environ["PROD_SSH_PRIVATE_KEY"].strip()
          key = raw_key.replace("\\r", "").replace("\r", "")
          key = key.replace("\\n", "\n")

          if "BEGIN " not in key:
              try:
                  decoded = base64.b64decode(raw_key).decode("utf-8")
                  decoded = decoded.replace("\\r", "").replace("\r", "")
                  decoded = decoded.replace("\\n", "\n")
                  if "BEGIN " in decoded:
                      key = decoded
              except Exception:
                  pass

          valid_headers = (
              "-----BEGIN OPENSSH PRIVATE KEY-----",
              "-----BEGIN RSA PRIVATE KEY-----",
              "-----BEGIN EC PRIVATE KEY-----",
          )
          if not any(header in key for header in valid_headers):
              print("PROD_SSH_PRIVATE_KEY is not a valid OpenSSH/RSA/EC private key.", file=sys.stderr)
              sys.exit(1)

          if not key.endswith("\n"):
              key += "\n"

          Path.home().joinpath(".ssh", "mykinlegacy_prod").write_text(key)
          PY
          chmod 600 ~/.ssh/mykinlegacy_prod
          ssh-keygen -y -f ~/.ssh/mykinlegacy_prod > /dev/null
          ssh-keyscan -p "$PROD_SSH_PORT" -H "$PROD_SSH_HOST" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Run production ops action
        shell: bash
        run: |
          ssh -i ~/.ssh/mykinlegacy_prod \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -p "$PROD_SSH_PORT" \
            "$PROD_SSH_USER@$PROD_SSH_HOST" \
            'bash -s' -- "$PROD_PROJECT_DIR" "$OPS_ACTION" "$STRIPE_LIVE_SECRET_KEY" "$STRIPE_LIVE_WEBHOOK_SECRET" "${ORDER_NUMBER:-__EMPTY__}" "${OPENAI_API_KEY:-__EMPTY__}" <<'REMOTE_SCRIPT'
          set -euo pipefail
          PROJECT_DIR="$1"
          ACTION="$2"
          STRIPE_LIVE_SECRET_KEY_FROM_SECRET="${3:-}"
          STRIPE_LIVE_WEBHOOK_SECRET_FROM_SECRET="${4:-}"
          ORDER_NUMBER="${5:-}"
          OPENAI_API_KEY_FROM_SECRET="${6:-}"
          [ "$ORDER_NUMBER" = "__EMPTY__" ] && ORDER_NUMBER=""
          [ "$OPENAI_API_KEY_FROM_SECRET" = "__EMPTY__" ] && OPENAI_API_KEY_FROM_SECRET=""

          echo "SSH connection success: yes"
          test -d "$PROJECT_DIR"
          echo "project directory exists: yes"

          cd "$PROJECT_DIR"

          case "$ACTION" in
            inspect_production_lock)
              echo "READ_ONLY_ACTION inspect_production_lock no_git_pull=yes no_lock_mutation=yes"
              LOCK_FILE="$PROJECT_DIR/deployment/.production.lock"
              echo "EVIDENCE_BEGIN"
              echo "vps_time=$(date --iso-8601=seconds)"
              echo "hostname=$(hostname)"
              echo "executing_user=$(id -un)"
              echo "project_directory=$PROJECT_DIR"
              echo "current_commit=$(git -C "$PROJECT_DIR" rev-parse HEAD)"
              echo "current_branch=$(git -C "$PROJECT_DIR" rev-parse --abbrev-ref HEAD)"
              echo "lock_path=$LOCK_FILE"
              if [ -e "$LOCK_FILE" ]; then
                stat -c 'lock_owner=%U:%G%nlock_permissions=%A (%a)%nlock_size=%s%nlock_created=%w%nlock_modified=%y%nlock_inode=%i' "$LOCK_FILE"
                echo "lock_sha256=$(sha256sum "$LOCK_FILE" | awk '{print $1}')"
                if [ "$(stat -c %s "$LOCK_FILE")" -le 4096 ]; then
                  echo "lock_content_begin"
                  sed -E \
                    -e 's/((TOKEN|SECRET|PASSWORD|PRIVATE_KEY|API_KEY)[=:])[[:graph:]]+/\1[REDACTED]/Ig' \
                    "$LOCK_FILE"
                  echo "lock_content_end"
                else
                  echo "lock_content_omitted=oversize"
                fi
              else
                echo "lock_exists=no"
              fi

              echo "lock_kernel_holders_begin"
              if command -v lslocks >/dev/null 2>&1; then
                lslocks -n -o PID,PPID,COMMAND,TYPE,MODE,START,END,PATH 2>/dev/null |
                  awk -v lock="$LOCK_FILE" '$0 ~ lock { print }' || true
              fi
              if command -v fuser >/dev/null 2>&1; then
                fuser -v "$LOCK_FILE" 2>&1 || true
              fi
              echo "lock_kernel_holders_end"

              HOLDER_PIDS="$(
                {
                  command -v lslocks >/dev/null 2>&1 &&
                    lslocks -n -o PID,PATH 2>/dev/null |
                    awk -v lock="$LOCK_FILE" '$2 == lock && $1 ~ /^[0-9]+$/ { print $1 }'
                  command -v fuser >/dev/null 2>&1 &&
                    fuser "$LOCK_FILE" 2>/dev/null | tr ' ' '\n'
                } | awk '/^[0-9]+$/' | sort -u
              )"

              echo "holder_processes_begin"
              for pid in $HOLDER_PIDS; do
                if kill -0 "$pid" 2>/dev/null; then
                  ps -o pid=,ppid=,user=,lstart=,etime=,stat=,pcpu=,pmem=,args= -p "$pid" || true
                  echo "pid=${pid} cwd=$(readlink -f "/proc/$pid/cwd" 2>/dev/null || echo unavailable)"
                  echo "pid=${pid} io_begin"
                  awk '/^(rchar|wchar|read_bytes|write_bytes):/ { print }' "/proc/$pid/io" 2>/dev/null || true
                  echo "pid=${pid} io_end"
                else
                  echo "pid=${pid} status=not_alive"
                fi
              done
              echo "holder_processes_end"

              echo "deployment_processes_begin"
              ps -eo pid,ppid,user,lstart,etime,stat,pcpu,pmem,args --sort=pid |
                grep -E '[d]eploy\\.sh|[w]ith-production-lock|[d]ocker compose|[g]it (fetch|pull|checkout)|[p]npm|[n]pm|[n]ode|[r]sync|[s]ystemctl|[s]ervice .*restart' ||
                true
              echo "deployment_processes_end"

              echo "service_state_begin"
              docker compose -p mykinlegacy --env-file "$PROJECT_DIR/deployment/.env.production" \
                -f "$PROJECT_DIR/deployment/docker-compose.yml" ps || true
              docker inspect \
                --format '{{.Name}} status={{.State.Status}} running={{.State.Running}} restarting={{.State.Restarting}} restart_count={{.RestartCount}} started={{.State.StartedAt}} finished={{.State.FinishedAt}}' \
                mykinlegacy_mysql mykinlegacy_redis mykinlegacy_api mykinlegacy_worker mykinlegacy_web mykinlegacy_nginx 2>/dev/null ||
                true
              echo "service_state_end"

              echo "release_state_begin"
              test -f "$PROJECT_DIR/deployment/.last-successful-commit" &&
                echo "last_successful_commit=$(tr -d '[:space:]' < "$PROJECT_DIR/deployment/.last-successful-commit")"
              test -f "$PROJECT_DIR/deployment/.current_revision" &&
                echo "current_revision=$(tr -d '[:space:]' < "$PROJECT_DIR/deployment/.current_revision")"
              echo "deployment_model=docker_compose_no_release_symlink"
              echo "git_status_begin"
              git -C "$PROJECT_DIR" status --short --untracked-files=no
              echo "git_status_end"
              echo "release_state_end"
              echo "EVIDENCE_END"
              ;;
            terminate_stuck_production_deployment)
              echo "CONTROLLED_ACTION terminate_stuck_production_deployment"
              LOCK_FILE="$PROJECT_DIR/deployment/.production.lock"
              EXPECTED_COMMIT="c71c9626f60ce9aa59db5db64f384e55c9bc7c0b"

              holder_pid="$(
                lslocks -n -o PID,PATH 2>/dev/null |
                  awk -v lock="$LOCK_FILE" '$2 == lock && $1 ~ /^[0-9]+$/ { print $1; exit }'
              )"
              if [ -z "$holder_pid" ]; then
                echo "CONTROLLED_TERMINATION_NOT_REQUIRED lock_holder=none"
                exit 0
              fi

              holder_command="$(ps -o args= -p "$holder_pid" 2>/dev/null || true)"
              holder_age="$(ps -o etimes= -p "$holder_pid" 2>/dev/null | tr -d ' ' || true)"
              echo "termination_candidate_pid=$holder_pid"
              echo "termination_candidate_age_seconds=${holder_age:-unknown}"
              echo "termination_candidate_command=$holder_command"

              [[ "$holder_pid" =~ ^[0-9]+$ ]] || {
                echo "REFUSE_TERMINATION reason=invalid_pid" >&2
                exit 41
              }
              [[ "$holder_age" =~ ^[0-9]+$ ]] && [ "$holder_age" -ge 1800 ] || {
                echo "REFUSE_TERMINATION reason=deployment_not_old_enough" >&2
                exit 42
              }
              [[ "$holder_command" == *"flock"*".production.lock"* ]] &&
                [[ "$holder_command" == *"deployment/deploy.sh"* ]] || {
                echo "REFUSE_TERMINATION reason=holder_command_not_approved" >&2
                exit 43
              }

              last_successful_commit="$(tr -d '[:space:]' < "$PROJECT_DIR/deployment/.last-successful-commit")"
              [ "$last_successful_commit" = "$EXPECTED_COMMIT" ] || {
                echo "REFUSE_TERMINATION reason=unexpected_last_successful_commit actual=$last_successful_commit" >&2
                exit 44
              }

              required_services=(mysql redis api worker web nginx)
              for service in "${required_services[@]}"; do
                container_id="$(
                  docker compose -p mykinlegacy --env-file "$PROJECT_DIR/deployment/.env.production" \
                    -f "$PROJECT_DIR/deployment/docker-compose.yml" ps -q "$service"
                )"
                [ -n "$container_id" ] || {
                  echo "REFUSE_TERMINATION reason=missing_service service=$service" >&2
                  exit 45
                }
                running="$(docker inspect --format '{{.State.Running}}' "$container_id")"
                restarting="$(docker inspect --format '{{.State.Restarting}}' "$container_id")"
                [ "$running" = "true" ] && [ "$restarting" = "false" ] || {
                  echo "REFUSE_TERMINATION reason=unhealthy_service_state service=$service running=$running restarting=$restarting" >&2
                  exit 46
                }
              done

              root_pid="$holder_pid"
              holder_parent="$(ps -o ppid= -p "$holder_pid" | tr -d ' ')"
              holder_parent_command="$(ps -o args= -p "$holder_parent" 2>/dev/null || true)"
              if [[ "$holder_parent_command" == *"with-production-lock.sh"*"deploy"* ]]; then
                root_pid="$holder_parent"
              fi

              collect_tree_postorder() {
                local pid="$1" child
                while read -r child; do
                  [ -n "$child" ] && collect_tree_postorder "$child"
                done < <(pgrep -P "$pid" 2>/dev/null || true)
                echo "$pid"
              }

              mapfile -t deployment_pids < <(collect_tree_postorder "$root_pid" | awk '/^[0-9]+$/' | awk '!seen[$0]++')
              [ "${#deployment_pids[@]}" -gt 1 ] || {
                echo "REFUSE_TERMINATION reason=deployment_tree_incomplete" >&2
                exit 47
              }

              allowed_pattern='with-production-lock\.sh|flock .*\.production\.lock|deployment/deploy\.sh|docker compose .*run --rm api .*db:seed|docker-compose .*run --rm api .*db:seed|corepack pnpm db:seed|pnpm .*database db:seed|seed-cli|prisma/seed|tsx.*prisma/seed|esbuild.*service'
              echo "verified_deployment_tree_begin"
              for pid in "${deployment_pids[@]}"; do
                command_line="$(ps -o args= -p "$pid" 2>/dev/null || true)"
                [ -n "$command_line" ] || continue
                echo "pid=$pid command=$command_line"
                grep -Eq "$allowed_pattern" <<<"$command_line" || {
                  echo "REFUSE_TERMINATION reason=unexpected_process pid=$pid command=$command_line" >&2
                  exit 48
                }
              done
              echo "verified_deployment_tree_end"

              activity_sample() {
                local pid="$1" stat_line cpu write_bytes
                stat_line="$(cat "/proc/$pid/stat" 2>/dev/null || true)"
                cpu="$(awk '{ print $14 + $15 }' <<<"$stat_line" 2>/dev/null || echo 0)"
                write_bytes="$(awk '$1 == "write_bytes:" { print $2 }' "/proc/$pid/io" 2>/dev/null || echo 0)"
                echo "${cpu:-0}:${write_bytes:-0}"
              }

              before_activity=""
              for pid in "${deployment_pids[@]}"; do
                before_activity+="$pid=$(activity_sample "$pid") "
              done
              sleep 5
              for entry in $before_activity; do
                pid="${entry%%=*}"
                before="${entry#*=}"
                after="$(activity_sample "$pid")"
                [ "$before" = "$after" ] || {
                  echo "REFUSE_TERMINATION reason=deployment_activity_detected pid=$pid before=$before after=$after" >&2
                  exit 49
                }
              done
              echo "deployment_activity_sample=idle duration_seconds=5"

              echo "CONTROLLED_TERMINATION_BEGIN root_pid=$root_pid holder_pid=$holder_pid"
              for pid in "${deployment_pids[@]}"; do
                kill -TERM "$pid" 2>/dev/null || true
              done

              for _ in $(seq 1 20); do
                remaining=0
                for pid in "${deployment_pids[@]}"; do
                  kill -0 "$pid" 2>/dev/null && remaining=$((remaining + 1))
                done
                [ "$remaining" -eq 0 ] && break
                sleep 1
              done

              for pid in "${deployment_pids[@]}"; do
                if kill -0 "$pid" 2>/dev/null; then
                  echo "CONTROLLED_TERMINATION_FORCE pid=$pid"
                  kill -KILL "$pid" 2>/dev/null || true
                fi
              done

              while read -r oneoff_id oneoff_name; do
                [ -n "$oneoff_id" ] || continue
                oneoff_command="$(docker inspect --format '{{json .Config.Cmd}}' "$oneoff_id" 2>/dev/null || true)"
                [[ "$oneoff_command" == *"db:seed"* ]] || {
                  echo "REFUSE_CONTAINER_CLEANUP name=$oneoff_name reason=not_seed_container" >&2
                  continue
                }
                echo "REMOVING_STUCK_ONEOFF_CONTAINER name=$oneoff_name"
                docker rm -f "$oneoff_id" >/dev/null
              done < <(
                docker ps -a \
                  --filter label=com.docker.compose.project=mykinlegacy \
                  --filter label=com.docker.compose.oneoff=True \
                  --filter label=com.docker.compose.service=api \
                  --format '{{.ID}} {{.Names}}'
              )

              if lslocks -n -o PID,PATH 2>/dev/null | awk -v lock="$LOCK_FILE" '$2 == lock { found=1 } END { exit found ? 0 : 1 }'; then
                echo "CONTROLLED_TERMINATION_FAILED reason=lock_still_held" >&2
                exit 50
              fi
              echo "production_lock_kernel_holder=none"
              echo "production_lock_file_preserved=yes reason=stable_flock_inode"

              bash "$PROJECT_DIR/deployment/health-check.sh"
              echo "CONTROLLED_TERMINATION_COMPLETE current_production_commit=$last_successful_commit"
              ;;
            safe_deploy)
              git fetch origin main
              git checkout main
              git pull --ff-only origin main
              bash deployment/run-ops-action.sh "$ACTION" "$ORDER_NUMBER"
              ;;
            restart_nginx)
              echo "LIGHTWEIGHT_ACTION restart_nginx no_git_pull=yes no_build=yes"
              bash deployment/with-production-lock.sh "ops:restart_nginx" bash -lc '
                set -euo pipefail
                cd "$1"
                docker compose -p mykinlegacy --env-file deployment/.env.production -f deployment/docker-compose.yml up -d --no-build nginx
                bash deployment/health-check.sh
              ' bash "$PROJECT_DIR"
              ;;
            restart_services)
              echo "LIGHTWEIGHT_ACTION restart_services no_git_pull=yes no_build=yes"
              bash deployment/with-production-lock.sh "ops:restart_services" bash -lc '
                set -euo pipefail
                cd "$1"
                docker compose -p mykinlegacy --env-file deployment/.env.production -f deployment/docker-compose.yml up -d --no-build
                bash deployment/health-check.sh
              ' bash "$PROJECT_DIR"
              ;;
            switch_stripe_live)
              echo "LIGHTWEIGHT_ACTION switch_stripe_live no_git_pull=yes no_build=yes checkout_remains_paused=yes"
              exec 9>"$PROJECT_DIR/deployment/.production.lock"
              echo "Waiting for production lock: ops:switch_stripe_live"
              flock -x -w 1800 9
              echo "production_lock=held"

              STRIPE_LIVE_SECRET_KEY="$STRIPE_LIVE_SECRET_KEY_FROM_SECRET"
              STRIPE_LIVE_WEBHOOK_SECRET="$STRIPE_LIVE_WEBHOOK_SECRET_FROM_SECRET"
              ENV_FILE="$PROJECT_DIR/deployment/.env.production"
              COMPOSE_FILE="$PROJECT_DIR/deployment/docker-compose.yml"
              IMAGE_FILE="$PROJECT_DIR/deployment/.last-successful-image"

              cd "$PROJECT_DIR"
              test -f "$ENV_FILE"
              test -f "$COMPOSE_FILE"
              test -f "$IMAGE_FILE"
              if [[ "$STRIPE_LIVE_SECRET_KEY" != rk_live_* ]]; then
                echo "FAIL Stripe live restricted key prefix is invalid" >&2
                exit 1
              fi
              echo "stripe_live_key_prefix=valid"
              if [[ "$STRIPE_LIVE_WEBHOOK_SECRET" != whsec_* ]]; then
                echo "FAIL Stripe webhook signing secret prefix is invalid" >&2
                exit 1
              fi
              echo "stripe_webhook_secret_prefix=valid"

              BACKUP_FILE="$(mktemp "$PROJECT_DIR/deployment/.env.production.pre-stripe-live.XXXXXX")"
              cp "$ENV_FILE" "$BACKUP_FILE"
              chmod 600 "$BACKUP_FILE"

              rollback() {
                local status=$?
                if [ "$status" -ne 0 ]; then
                  echo "STRIPE_LIVE_SWITCH_FAILED rollback=started"
                  cp "$BACKUP_FILE" "$ENV_FILE"
                  chmod 600 "$ENV_FILE"
                  APP_IMAGE="$(tr -d '[:space:]' < "$IMAGE_FILE")"
                  export APP_IMAGE
                  docker compose -p mykinlegacy --env-file "$ENV_FILE" -f "$COMPOSE_FILE" \
                    up -d --no-build --no-deps --force-recreate api || true
                  bash "$PROJECT_DIR/deployment/health-check.sh" || true
                  echo "STRIPE_LIVE_SWITCH_FAILED rollback=complete"
                fi
                rm -f "$BACKUP_FILE"
                exit "$status"
              }
              trap rollback EXIT

              set_env_var() {
                local key="$1"
                local value="$2"
                local temp
                temp="$(mktemp "$PROJECT_DIR/deployment/.env.production.update.XXXXXX")"
                if grep -q "^${key}=" "$ENV_FILE"; then
                  awk -v key="$key" -v value="$value" \
                    'BEGIN { FS = OFS = "=" } $1 == key { print key "=" value; next } { print }' \
                    "$ENV_FILE" > "$temp"
                else
                  cat "$ENV_FILE" > "$temp"
                  printf '%s=%s\n' "$key" "$value" >> "$temp"
                fi
                chmod 600 "$temp"
                mv "$temp" "$ENV_FILE"
              }

              set_env_var "STRIPE_SECRET_KEY" "$STRIPE_LIVE_SECRET_KEY"
              set_env_var "STRIPE_WEBHOOK_SECRET" "$STRIPE_LIVE_WEBHOOK_SECRET"
              set_env_var "CHECKOUT_ENABLED" "false"
              set_env_var "FOUNDER_REVIEW_REQUIRED" "true"
              STRIPE_LIVE_SECRET_KEY=""
              STRIPE_LIVE_WEBHOOK_SECRET=""
              STRIPE_LIVE_SECRET_KEY_FROM_SECRET=""
              STRIPE_LIVE_WEBHOOK_SECRET_FROM_SECRET=""

              APP_IMAGE="$(tr -d '[:space:]' < "$IMAGE_FILE")"
              test -n "$APP_IMAGE"
              export APP_IMAGE
              docker compose -p mykinlegacy --env-file "$ENV_FILE" -f "$COMPOSE_FILE" \
                up -d --no-build --no-deps --force-recreate api

              for attempt in $(seq 1 12); do
                if bash "$PROJECT_DIR/deployment/health-check.sh"; then
                  break
                fi
                if [ "$attempt" -eq 12 ]; then
                  echo "FAIL health check did not pass after Stripe live switch" >&2
                  exit 1
                fi
                sleep 5
              done

              docker compose -p mykinlegacy --env-file "$ENV_FILE" -f "$COMPOSE_FILE" exec -T api node -e '
                const { StripeAdapter } = require("./apps/api/dist/payments/stripe.adapter.js");
                (async () => {
                  if (!process.env.STRIPE_SECRET_KEY?.startsWith("rk_live_")) throw new Error("API is not using the restricted live Stripe key");
                  if (!process.env.STRIPE_WEBHOOK_SECRET?.startsWith("whsec_")) throw new Error("API is not using a Stripe webhook signing secret");
                  if (process.env.CHECKOUT_ENABLED !== "false") throw new Error("Checkout must remain paused during live cutover verification");
                  if (process.env.FOUNDER_REVIEW_REQUIRED !== "true") throw new Error("Founder review hold must remain enabled");
                  const adapter = new StripeAdapter();
                  const result = await adapter.createCheckoutSession({
                    orderNumber: `LIVE-CUTOVER-${Date.now()}`,
                    amountCents: 4900,
                    currency: "USD",
                    productName: "MyKinLegacy Family Legacy Collection",
                    successUrl: "https://mykinlegacy.com/payment/success?live_cutover_verification=1",
                    cancelUrl: "https://mykinlegacy.com/payment/cancel?live_cutover_verification=1",
                    metadata: { verification_mode: "unpaid_live_cutover", product_code: "family_legacy_collection" }
                  });
                  if (!result.id.startsWith("cs_live_")) throw new Error("Stripe did not return a live Checkout Session");
                  console.log("stripe_key_mode=live_restricted");
                  console.log("stripe_webhook_secret_configured=true");
                  console.log("checkout_session_mode=live");
                  console.log("checkout_url_present=true");
                  console.log("checkout_verification_paid=false");
                  console.log("checkout_enabled=false");
                  console.log("founder_review_required=true");
                })().catch((error) => { console.error(`STRIPE_LIVE_PREFLIGHT_FAILED ${error.message}`); process.exit(1); });
              '

              echo "STRIPE_LIVE_SWITCH_COMPLETE checkout_enabled=false payment_completed=false"
              ;;
            docker_ps)
              echo "LIGHTWEIGHT_ACTION docker_ps no_git_pull=yes no_build=yes"
              bash deployment/with-production-lock.sh "ops:docker_ps" bash -lc '
                set -euo pipefail
                cd "$1"
                docker compose -p mykinlegacy --env-file deployment/.env.production -f deployment/docker-compose.yml ps
              ' bash "$PROJECT_DIR"
              ;;
            nginx_logs)
              echo "LIGHTWEIGHT_ACTION nginx_logs no_git_pull=yes no_build=yes"
              bash deployment/with-production-lock.sh "ops:nginx_logs" bash -lc 'docker logs mykinlegacy_nginx --tail 120'
              ;;
            api_logs)
              echo "LIGHTWEIGHT_ACTION api_logs no_git_pull=yes no_build=yes"
              bash deployment/with-production-lock.sh "ops:api_logs" bash -lc 'docker logs mykinlegacy_api --tail 120'
              ;;
            web_logs)
              echo "LIGHTWEIGHT_ACTION web_logs no_git_pull=yes no_build=yes"
              bash deployment/with-production-lock.sh "ops:web_logs" bash -lc 'docker logs mykinlegacy_web --tail 120'
              ;;
            worker_logs)
              echo "LIGHTWEIGHT_ACTION worker_logs no_git_pull=yes no_build=yes"
              bash deployment/with-production-lock.sh "ops:worker_logs" bash -lc 'docker logs mykinlegacy_worker --tail 120'
              ;;
            *)
              MYKINLEGACY_OPENAI_API_KEY="$OPENAI_API_KEY_FROM_SECRET" bash deployment/run-ops-action.sh "$ACTION" "$ORDER_NUMBER"
              ;;
          esac
          REMOTE_SCRIPT
