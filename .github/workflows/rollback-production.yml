name: Rollback Production

on:
  workflow_dispatch:
    inputs:
      commit_hash:
        description: Commit hash to roll production back to
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: mykinlegacy-production
  cancel-in-progress: false

jobs:
  rollback:
    name: Roll back production to selected commit
    runs-on: ubuntu-latest
    env:
      PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
      PROD_SSH_USER: ${{ secrets.PROD_SSH_USER }}
      PROD_SSH_PORT: ${{ secrets.PROD_SSH_PORT }}
      PROD_SSH_PRIVATE_KEY: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
      PROD_PROJECT_DIR: ${{ secrets.PROD_PROJECT_DIR }}
      ROLLBACK_COMMIT: ${{ inputs.commit_hash }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate production secrets
        shell: bash
        run: |
          : "${PROD_SSH_HOST:?Missing PROD_SSH_HOST}"
          : "${PROD_SSH_USER:?Missing PROD_SSH_USER}"
          : "${PROD_SSH_PORT:?Missing PROD_SSH_PORT}"
          : "${PROD_SSH_PRIVATE_KEY:?Missing PROD_SSH_PRIVATE_KEY}"
          : "${PROD_PROJECT_DIR:?Missing PROD_PROJECT_DIR}"
          : "${ROLLBACK_COMMIT:?Missing rollback commit}"

      - name: Configure SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$PROD_SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/mykinlegacy_prod
          chmod 600 ~/.ssh/mykinlegacy_prod
          ssh-keygen -y -f ~/.ssh/mykinlegacy_prod > /dev/null
          ssh-keyscan -p "$PROD_SSH_PORT" -H "$PROD_SSH_HOST" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Roll back production VPS
        shell: bash
        run: |
          ssh -i ~/.ssh/mykinlegacy_prod \
            -p "$PROD_SSH_PORT" \
            "$PROD_SSH_USER@$PROD_SSH_HOST" \
            'bash -s' -- "$PROD_PROJECT_DIR" "$ROLLBACK_COMMIT" <<'REMOTE_SCRIPT'
          set -euo pipefail
          PROJECT_DIR="$1"
          TARGET_COMMIT="$2"
          cd "$PROJECT_DIR"
          git fetch --all --prune
          printf 'ROLLBACK\n' | bash deployment/rollback.sh "$TARGET_COMMIT"
          bash deployment/status.sh
          REMOTE_SCRIPT
