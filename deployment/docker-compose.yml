services:
  mysql:
    image: mysql:8.0
    container_name: mykinlegacy_mysql
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - "--character-set-server=utf8mb4"
      - "--collation-server=utf8mb4_unicode_ci"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    container_name: mykinlegacy_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12

  api:
    image: ${APP_IMAGE:-mykinlegacy_app:latest}
    container_name: mykinlegacy_api
    working_dir: /app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      DATABASE_URL: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
      DIRECT_URL: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
      REDIS_URL: redis://redis:6379
      API_PORT: "4000"
    volumes:
      - private_storage:/app/.local-storage-production
    command: ["node", "apps/api/dist/main.js"]
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 20s
      timeout: 10s
      retries: 12

  worker:
    image: ${APP_IMAGE:-mykinlegacy_app:latest}
    container_name: mykinlegacy_worker
    working_dir: /app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      DATABASE_URL: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
      DIRECT_URL: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
      REDIS_URL: redis://redis:6379
    volumes:
      - private_storage:/app/.local-storage-production
    command: ["node", "apps/worker/dist/main.js"]
    healthcheck:
      test: ["CMD-SHELL", "node -e \"process.exit(0)\""]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    image: ${APP_IMAGE:-mykinlegacy_app:latest}
    container_name: mykinlegacy_web
    working_dir: /app
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      PORT: "3000"
      NEXT_PUBLIC_API_BASE_URL: /api/v1
      NEXT_PUBLIC_SITE_URL: https://${DOMAIN}
      APP_WEB_URL: https://${DOMAIN}
      APP_BASE_URL: https://${DOMAIN}
      ADMIN_ACCESS_TOKEN: ${ADMIN_ACCESS_TOKEN}
    command: ["corepack", "pnpm", "--filter", "@ai-heritage/web", "start"]
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 20s
      timeout: 10s
      retries: 12

  nginx:
    image: nginx:1.27-alpine
    container_name: mykinlegacy_nginx
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    env_file:
      - .env.production
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/templates/default.conf.template:ro
      - nginx_certs:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 6

volumes:
  mysql_data:
  redis_data:
  private_storage:
  nginx_certs:
  certbot_webroot:
