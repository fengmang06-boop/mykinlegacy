<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex,nofollow" />
    <title>MyKinLegacy Visual Review</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0a0908;
        --panel: #15120d;
        --gold: #c9a24a;
        --ivory: #f6ebd4;
        --muted: rgba(246, 235, 212, 0.72);
        --line: rgba(201, 162, 74, 0.28);
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--ivory);
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      main {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
        padding: 48px 0;
      }

      h1,
      h2 {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        font-weight: 500;
      }

      h1 {
        font-size: clamp(36px, 6vw, 72px);
      }

      p {
        color: var(--muted);
        line-height: 1.65;
      }

      section {
        margin-top: 40px;
        padding: 22px;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: var(--panel);
      }

      .grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(240px, 0.36fr);
        gap: 18px;
        align-items: start;
      }

      a {
        color: var(--gold);
      }

      img {
        width: 100%;
        height: auto;
        display: block;
        border: 1px solid var(--line);
        border-radius: 12px;
      }

      @media (max-width: 760px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>MyKinLegacy Visual Review</h1>
      <p>Design review captures for homepage, create, and Family Legacy Collection pages.</p>

      <section>
        <h2>Homepage</h2>
        <div class="grid">
          <a href="./home-desktop.png"><img src="./home-desktop.png" alt="Homepage desktop" /></a>
          <a href="./home-mobile.png"><img src="./home-mobile.png" alt="Homepage mobile" /></a>
        </div>
      </section>

      <section>
        <h2>Create</h2>
        <div class="grid">
          <a href="./create-desktop.png"><img src="./create-desktop.png" alt="Create desktop" /></a>
          <a href="./create-mobile.png"><img src="./create-mobile.png" alt="Create mobile" /></a>
        </div>
      </section>

      <section>
        <h2>Family Legacy Collection</h2>
        <div class="grid">
          <a href="./collection-desktop.png"
            ><img src="./collection-desktop.png" alt="Collection desktop"
          /></a>
          <a href="./collection-mobile.png"
            ><img src="./collection-mobile.png" alt="Collection mobile"
          /></a>
        </div>
      </section>
    </main>
  </body>
</html>
